# Builds a staging copy of each PR. Publish Staging (on main) deploys it to GitHub Pages.
# Production on Hostinger is untouched — it only redeploys when the PR merges to main.
name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # GitHub Pages serves this repo at /nutermia-website/
      - name: Build staging site
        run: pnpm build
        env:
          VITE_BASE: /nutermia-website/

      - uses: actions/upload-artifact@v4
        with:
          name: staging-site
          path: dist
          retention-days: 2

      - name: Comment staging URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = "https://junan300.github.io/nutermia-website/";
            const marker = "<!-- staging-preview -->";
            const body = [
              marker,
              "### Staging preview (not production)",
              "",
              `🔗 **[Open staging preview](${url})**`,
              "",
              "This link updates automatically after **Publish Staging** finishes (usually ~1–2 minutes after this check).",
              "No git clone needed — open it on your phone or laptop.",
              "",
              "Production on **Hostinger** only changes when this PR is **merged into `main`**.",
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
